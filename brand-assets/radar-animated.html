<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Radar — embeddable</title>
<style>
  /* Make the file usable both standalone (centered) AND as an iframe (transparent). */
  html, body { margin:0; padding:0; height:100%; background:transparent; }
  body { display:flex; align-items:center; justify-content:center; }

  /* ---------- COPY-PASTE EMBED START ---------- */
  /* Drop this CSS + the .radar-tt markup below into your site. */
  /* Resize via the .radar-tt's inline width/height (or wrap in a container). */

  @keyframes rttSweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .radar-tt {
    position: relative;
    border-radius: 50%;
    background: #ffffff;
    overflow: hidden;
    border: 2.5px solid #0f172a;
    color: #0f172a;
    flex-shrink: 0;
  }
  .radar-tt .rtt-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid currentColor; opacity: .30;
  }
  .radar-tt .rtt-cv,
  .radar-tt .rtt-ch {
    position: absolute; background: currentColor; opacity: .20;
  }
  .radar-tt .rtt-cv { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }
  .radar-tt .rtt-ch { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }

  .radar-tt .rtt-blip {
    position: absolute; transform: translate(-50%, -50%);
  }

  .radar-tt .rtt-sweep {
    position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
    animation: rttSweep var(--rtt-dur, 6s) linear infinite;
  }
  .radar-tt .rtt-trail {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 90deg,
      rgba(59,130,246,0) 0deg,
      rgba(59,130,246,0) 240deg,
      rgba(59,130,246,0.55) 360deg);
  }
  .radar-tt .rtt-line {
    position: absolute; left: 50%; top: 50%;
    width: 50%; height: 2px;
    background: #3b82f6;
    transform-origin: 0 50%;
    box-shadow: 0 0 4px rgba(59,130,246,0.5);
  }
  .radar-tt .rtt-line.thin { height: 1.5px; box-shadow: 0 0 2px rgba(59,130,246,0.5); }

  .radar-tt .rtt-dot {
    position: absolute; left: 50%; top: 50%;
    width: 5px; height: 5px; background: #0f172a; border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  /* Dark variant: <div class="radar-tt dark" ...> on black bg */
  .radar-tt.dark { background: #0f172a; border-color: #ffffff; color: #ffffff; }
  .radar-tt.dark .rtt-dot { background: #ffffff; }
  /* ---------- COPY-PASTE EMBED END ---------- */
</style>
</head>
<body>

<!-- Outer radar — 200×200. Change the inline width/height to scale. -->
<div class="radar-tt" style="width:200px; height:200px; --rtt-dur:6s;">
  <div class="rtt-ring" style="width:22%; height:22%; left:39%; top:39%;"></div>
  <div class="rtt-ring" style="width:44%; height:44%; left:28%; top:28%;"></div>
  <div class="rtt-ring" style="width:66%; height:66%; left:17%; top:17%;"></div>
  <div class="rtt-cv"></div>
  <div class="rtt-ch"></div>

  <!-- 4 mini radars as blips. Each is a fully-formed mini radar with its own sweep. -->
  <div class="rtt-blip" style="left:30%; top:32%; width:38px; height:38px;">
    <div class="radar-tt" style="width:100%; height:100%; border-width:1.5px; --rtt-dur:2.4s;">
      <div class="rtt-ring" style="width:40%; height:40%; left:30%; top:30%;"></div>
      <div class="rtt-ring" style="width:75%; height:75%; left:12.5%; top:12.5%;"></div>
      <div class="rtt-cv"></div>
      <div class="rtt-ch"></div>
      <div class="rtt-sweep">
        <div class="rtt-trail"></div>
        <div class="rtt-line"></div>
      </div>
      <div class="rtt-dot" style="width:3px; height:3px;"></div>
    </div>
  </div>

  <div class="rtt-blip" style="left:70%; top:36%; width:30px; height:30px;">
    <div class="radar-tt" style="width:100%; height:100%; border-width:1.5px; --rtt-dur:3.1s;">
      <div class="rtt-ring" style="width:40%; height:40%; left:30%; top:30%;"></div>
      <div class="rtt-cv"></div>
      <div class="rtt-ch"></div>
      <div class="rtt-sweep">
        <div class="rtt-trail"></div>
        <div class="rtt-line thin"></div>
      </div>
      <div class="rtt-dot" style="width:3px; height:3px;"></div>
    </div>
  </div>

  <div class="rtt-blip" style="left:66%; top:70%; width:34px; height:34px;">
    <div class="radar-tt" style="width:100%; height:100%; border-width:1.5px; --rtt-dur:2.7s;">
      <div class="rtt-ring" style="width:40%; height:40%; left:30%; top:30%;"></div>
      <div class="rtt-ring" style="width:75%; height:75%; left:12.5%; top:12.5%;"></div>
      <div class="rtt-cv"></div>
      <div class="rtt-ch"></div>
      <div class="rtt-sweep">
        <div class="rtt-trail"></div>
        <div class="rtt-line"></div>
      </div>
      <div class="rtt-dot" style="width:3px; height:3px;"></div>
    </div>
  </div>

  <div class="rtt-blip" style="left:32%; top:68%; width:28px; height:28px;">
    <div class="radar-tt" style="width:100%; height:100%; border-width:1.5px; --rtt-dur:3.6s;">
      <div class="rtt-ring" style="width:40%; height:40%; left:30%; top:30%;"></div>
      <div class="rtt-cv"></div>
      <div class="rtt-ch"></div>
      <div class="rtt-sweep">
        <div class="rtt-trail"></div>
        <div class="rtt-line thin"></div>
      </div>
      <div class="rtt-dot" style="width:3px; height:3px;"></div>
    </div>
  </div>

  <!-- Outer sweep -->
  <div class="rtt-sweep">
    <div class="rtt-trail"></div>
    <div class="rtt-line"></div>
  </div>
  <div class="rtt-dot"></div>
</div>

</body>
</html>
